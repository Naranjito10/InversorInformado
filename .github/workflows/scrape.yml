name: Scrape viviendas

on:
  # Cada hora en punto
  schedule:
    - cron: '0 * * * *'
  # Disparar manualmente
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Scrapling browsers
        run: |
          scrapling install

      - name: Run scraper (one cycle)
        env:
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:           ${{ secrets.SUPABASE_KEY }}
          SMTP_HOST:              ${{ secrets.SMTP_HOST }}
          SMTP_PORT:              ${{ secrets.SMTP_PORT }}
          SMTP_USER:              ${{ secrets.SMTP_USER }}
          SMTP_PASS:              ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_FROM:       ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO:         ${{ secrets.ALERT_EMAIL_TO }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_MIN_SCORE_HIGH:   ${{ vars.ALERT_MIN_SCORE_HIGH || '80' }}
          SCRAPER_DELAY_MIN:      '2'
          SCRAPER_DELAY_MAX:      '6'
          SCRAPER_MAX_PAGES_PER_SEARCH: '3'
          LOG_LEVEL:              'INFO'
        run: |
          python -m scraper.scheduler once

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: logs/*.jsonl
          retention-days: 14
          if-no-files-found: ignore

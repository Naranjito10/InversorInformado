<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informe de Zona — Análisis Inmobiliario</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --bg4: #252525;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0ede8;
    --text2: #9a9690;
    --text3: #5a5754;
    --accent: #c8a96e;
    --accent2: #e8c87a;
    --green: #4caf82;
    --green-bg: rgba(76,175,130,0.1);
    --red: #e07070;
    --red-bg: rgba(224,112,112,0.1);
    --amber: #d4955a;
    --amber-bg: rgba(212,149,90,0.1);
    --blue: #6b9fd4;
    --blue-bg: rgba(107,159,212,0.1);
    --font-display: 'DM Serif Display', serif;
    --font-body: 'Outfit', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --radius: 8px;
    --radius-lg: 14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 0.02em;
  }
  .logo span { color: var(--text2); font-size: 13px; font-family: var(--font-body); font-weight: 300; margin-left: 12px; }
  .header-right { font-size: 12px; color: var(--text3); font-family: var(--font-mono); }

  /* ZONE SELECTOR */
  .zone-bar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    align-items: center;
    gap: 4px;
    height: 50px;
  }
  .zone-bar-label { font-size: 11px; color: var(--text3); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.1em; margin-right: 12px; }
  .zbtn {
    padding: 6px 16px;
    border: 1px solid var(--border2);
    border-radius: 100px;
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-family: var(--font-body);
    cursor: pointer;
    transition: all 0.2s;
  }
  .zbtn:hover { border-color: var(--accent); color: var(--text); }
  .zbtn.active { background: var(--accent); border-color: var(--accent); color: #0f0f0f; font-weight: 600; }

  /* LAYOUT */
  .page { max-width: 1100px; margin: 0 auto; padding: 40px 40px 80px; }

  /* ZONE HERO */
  .zone-hero { margin-bottom: 40px; padding-bottom: 32px; border-bottom: 1px solid var(--border); }
  .zone-hero-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .zone-hero-left { }
  .zone-eyebrow { font-size: 11px; color: var(--accent); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px; }
  .zone-title { font-family: var(--font-display); font-size: 52px; color: var(--text); line-height: 1.05; margin-bottom: 6px; }
  .zone-sub { font-size: 15px; color: var(--text2); font-weight: 300; }
  .zone-rating-block { text-align: right; }
  .rating-letter { font-family: var(--font-display); font-size: 72px; line-height: 1; }
  .rating-a { color: var(--green); }
  .rating-b { color: var(--accent); }
  .rating-c { color: var(--amber); }
  .rating-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .zone-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; }
  .tag { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 100px; font-size: 12px; font-weight: 500; }
  .tag-green { background: var(--green-bg); color: var(--green); border: 1px solid rgba(76,175,130,0.2); }
  .tag-amber { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(212,149,90,0.2); }
  .tag-red { background: var(--red-bg); color: var(--red); border: 1px solid rgba(224,112,112,0.2); }
  .tag-blue { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(107,159,212,0.2); }
  .tag-accent { background: rgba(200,169,110,0.1); color: var(--accent); border: 1px solid rgba(200,169,110,0.2); }

  /* SECTIONS */
  .section { margin-bottom: 48px; }
  .section-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 20px; }
  .section-title { font-family: var(--font-display); font-size: 22px; color: var(--text); }
  .section-line { flex: 1; height: 1px; background: var(--border); }
  .section-num { font-family: var(--font-mono); font-size: 11px; color: var(--text3); }

  /* KPI GRID */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
  .kpi-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    transition: border-color 0.2s;
  }
  .kpi-card:hover { border-color: var(--border2); }
  .kpi-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; font-family: var(--font-mono); }
  .kpi-value { font-size: 26px; font-weight: 600; color: var(--text); line-height: 1; margin-bottom: 6px; }
  .kpi-delta { font-size: 12px; font-weight: 400; }
  .up { color: var(--green); }
  .dn { color: var(--red); }
  .nt { color: var(--text2); }

  /* SERVICES */
  .svc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
  .svc-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 15px;
  }
  .svc-icon { font-size: 18px; width: 20px; text-align: center; flex-shrink: 0; }
  .svc-name { font-size: 13px; color: var(--text); flex: 1; }
  .svc-score { font-size: 14px; font-weight: 600; font-family: var(--font-mono); margin-right: 8px; }
  .score-h { color: var(--green); }
  .score-m { color: var(--amber); }
  .score-l { color: var(--red); }
  .stars { display: flex; gap: 2px; }
  .star { width: 8px; height: 8px; border-radius: 1px; background: var(--bg4); }
  .star-h { background: var(--green); }
  .star-m { background: var(--amber); }
  .star-l { background: var(--red); }

  /* CHARTS */
  .chart-container { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }
  .chart-legend { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .leg-dot { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
  .chart-note { font-size: 12px; color: var(--text3); margin-top: 12px; font-style: italic; }
  .chart-wrap { position: relative; width: 100%; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }

  /* ALERT BOXES */
  .opp-box {
    background: var(--green-bg); border: 1px solid rgba(76,175,130,0.25);
    border-radius: var(--radius); padding: 14px 18px; font-size: 14px; color: #7dd4a8; line-height: 1.7; margin-bottom: 12px;
  }
  .alert-box {
    background: var(--amber-bg); border: 1px solid rgba(212,149,90,0.25);
    border-radius: var(--radius); padding: 14px 18px; font-size: 14px; color: #d4955a; line-height: 1.7;
  }
  .icon-inline { margin-right: 6px; vertical-align: -1px; }

  /* SIMULATOR */
  .simulator { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; }
  .sim-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .sim-label { font-size: 13px; color: var(--text2); width: 150px; flex-shrink: 0; }
  .sim-slider { flex: 1; -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: var(--bg4); outline: none; cursor: pointer; }
  .sim-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 2px solid var(--bg); }
  .sim-slider::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 2px solid var(--bg); }
  .sim-val { font-size: 13px; font-weight: 600; color: var(--text); width: 90px; text-align: right; font-family: var(--font-mono); }
  .sim-results { border-top: 1px solid var(--border); margin-top: 20px; padding-top: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
  .sim-result-item { background: var(--bg3); border-radius: var(--radius); padding: 14px; }
  .sim-result-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; font-family: var(--font-mono); margin-bottom: 5px; }
  .sim-result-value { font-size: 18px; font-weight: 600; color: var(--text); }

  /* COMP ZONES */
  .comp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 10px; margin-top: 16px; }
  .comp-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px;
    transition: border-color 0.2s;
  }
  .comp-card.focus { border-color: var(--accent); }
  .comp-zone-name { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; font-family: var(--font-mono); margin-bottom: 6px; }
  .comp-yield { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .comp-details { font-size: 11px; color: var(--text2); line-height: 1.5; margin-bottom: 8px; }
  .comp-badge { font-size: 11px; padding: 2px 8px; border-radius: 100px; font-weight: 500; }
  .cb-focus { background: var(--blue-bg); color: var(--blue); }
  .cb-green { background: var(--green-bg); color: var(--green); }
  .cb-amber { background: var(--amber-bg); color: var(--amber); }

  /* RATING */
  .rating-detail-block { display: flex; align-items: center; gap: 28px; }
  .rating-big { font-family: var(--font-display); font-size: 80px; line-height: 1; color: var(--text); flex-shrink: 0; }
  .rating-bars { flex: 1; }
  .rbar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .rbar-label { font-size: 12px; color: var(--text2); width: 140px; flex-shrink: 0; }
  .rbar-track { flex: 1; height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
  .rbar-fill { height: 100%; border-radius: 2px; background: var(--accent); }
  .rbar-num { font-size: 12px; color: var(--text3); font-family: var(--font-mono); width: 28px; text-align: right; }

  /* INVESTOR PROFILES */
  .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .inv-grid { grid-template-columns: 1fr; } }
  .inv-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px;
    transition: border-color 0.2s;
  }
  .inv-card.recommended { border-color: var(--green); }
  .inv-rec-badge { display: inline-block; font-size: 11px; padding: 3px 9px; background: var(--green-bg); color: var(--green); border-radius: 100px; margin-bottom: 10px; font-weight: 500; }
  .inv-type { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; font-family: var(--font-mono); margin-bottom: 5px; }
  .inv-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .inv-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }

  /* RISKS */
  .risk-grid { display: grid; gap: 8px; }
  .risk-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px;
  }
  .risk-label { font-size: 13px; color: var(--text); flex: 1; }
  .risk-bar-track { width: 120px; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
  .risk-bar-fill { height: 100%; border-radius: 3px; }
  .rb-low { background: var(--green); }
  .rb-mid { background: var(--amber); }
  .rb-high { background: var(--red); }
  .risk-tag { font-size: 12px; font-weight: 500; width: 64px; text-align: right; font-family: var(--font-mono); flex-shrink: 0; }

  /* STEPS */
  .steps-grid { display: grid; gap: 10px; }
  .step-card {
    display: flex; gap: 16px;
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px;
  }
  .step-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg3); border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: var(--accent);
    flex-shrink: 0; font-family: var(--font-mono); margin-top: 2px;
  }
  .step-body { flex: 1; }
  .step-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
  .step-desc { font-size: 13px; color: var(--text2); line-height: 1.7; }
  .step-tag { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 100px; margin-top: 8px; font-weight: 500; }
  .st-now { background: var(--green-bg); color: var(--green); }
  .st-mid { background: var(--blue-bg); color: var(--blue); }
  .st-long { background: var(--amber-bg); color: var(--amber); }

  /* HAPPINESS */
  .hap-bar-track { height: 8px; border-radius: 4px; background: var(--bg4); overflow: hidden; margin-top: 8px; }
  .hap-bar-fill { height: 100%; border-radius: 4px; }

  /* FOOTER */
  .footer { border-top: 1px solid var(--border); padding-top: 32px; margin-top: 60px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .footer-left { font-family: var(--font-display); font-size: 16px; color: var(--accent); }
  .footer-right { font-size: 12px; color: var(--text3); font-family: var(--font-mono); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeUp 0.4s ease forwards; }
</style>
</head>
<body>

<header class="header">
  <div class="logo">Zona Report <span>— Análisis Inmobiliario</span></div>
  <div class="header-right" id="report-date"></div>
</header>

<div class="zone-bar">
  <span class="zone-bar-label">Zona</span>
  <button class="zbtn active" onclick="sel('gracia',this)">Gràcia, Barcelona</button>
  <button class="zbtn" onclick="sel('lavapies',this)">Lavapiés, Madrid</button>
  <button class="zbtn" onclick="sel('vic',this)">Vic, Osona</button>
</div>

<div class="page" id="page"></div>

<script>
document.getElementById('report-date').textContent = new Date().toLocaleDateString('es-ES', {day:'2-digit',month:'long',year:'numeric'});

var ZONES = {
  gracia: {
    name:'Gràcia', city:'Barcelona', type:'Barrio urbano consolidado', rating:'A', rscore:8.2, rlabel:'Muy recomendable',
    kpi:[
      {l:'Alquiler m²/mes',v:'18,4 €',d:'▲ +6,2% interanual',up:1},
      {l:'Venta €/m²',v:'4.850 €',d:'▲ +8,1% interanual',up:1},
      {l:'Rentabilidad bruta',v:'4,6%',d:'▲ +0,3 pp vs año ant.',up:1},
      {l:'Rentabilidad neta',v:'3,2%',d:'Descontando gastos',up:0},
      {l:'PER (años)',v:'22,1',d:'Recuperación inversión',up:0},
      {l:'Ocupación media',v:'97%',d:'→ Estable',up:0}
    ],
    svc:[
      {n:'Educación',s:9.1,l:'h'},{n:'Sanidad',s:8.4,l:'h'},
      {n:'Transporte',s:9.3,l:'h'},{n:'Comercio',s:9.0,l:'h'},
      {n:'Zonas verdes',s:6.2,l:'m'},{n:'Seguridad',s:7.1,l:'m'}
    ],
    crim:{nivel:'Medio-bajo',idx:28,trend:'Estable'},
    happy:{s:72,src:'Enquesta Municipal BCN 2024'},
    rentH:[9.2,9.8,10.5,12.1,13.8,15.2,14.1,14.9,16.3,17.5,18.4],
    ventaH:[2800,2950,3100,3500,3900,4200,4050,4300,4550,4700,4850],
    projR:[19.5,20.8,22.1,23.6,24.9], projV:[5100,5350,5600,5900,6200],
    yieldH:[3.9,3.8,4.0,4.3,4.6], yieldRef:[3.5,3.4,3.6,3.8,4.0],
    compZones:[
      {z:'Gràcia',v:4.6,pm:4850,pr:18.4,cls:'cb-focus',bl:'Analizada',focus:1},
      {z:'Sant Andreu',v:5.4,pm:3100,pr:14.0,cls:'cb-green',bl:'Mayor yield'},
      {z:'Nou Barris',v:5.9,pm:2400,pr:11.8,cls:'cb-green',bl:'Mayor yield'},
      {z:'Sants',v:5.0,pm:3600,pr:15.0,cls:'cb-green',bl:'Mayor yield'},
      {z:'Eixample',v:3.9,pm:5500,pr:17.8,cls:'cb-amber',bl:'Menor yield'},
      {z:'Sarrià',v:3.2,pm:6800,pr:18.1,cls:'cb-amber',bl:'Menor yield'}
    ],
    rdetail:[{l:'Servicios',v:8.7},{l:'Rentabilidad',v:6.9},{l:'Seguridad',v:7.1},{l:'Bienestar vecinal',v:7.2},{l:'Proyección',v:8.5}],
    opp:'La rentabilidad del 4,6% supera la media de Barcelona y la zona registra una de las tasas de ocupación más altas de la ciudad. Precio premium pero con la mayor liquidez del mercado.',
    alert:'Precio de entrada elevado (+8,1% interanual). El riesgo regulatorio en Barcelona (contención de rentas, restricciones turísticas) es el factor a vigilar más de cerca.',
    inv:[
      {t:'Perfil ideal',n:'Buy-to-let largo plazo',d:'Rentabilidad estable con alta ocupación. Bajo riesgo de desocupación. Revalorización constante.',rec:1},
      {t:'También adecuado',n:'Inversor patrimonialista',d:'Excelente para preservar capital con plusvalías. Zona de alta demanda y liquidez.',rec:0},
      {t:'Con matices',n:'Alquiler turístico',d:'Alta demanda pero regulación muy restrictiva en Barcelona. Riesgo regulatorio elevado.',rec:0},
      {t:'No recomendado',n:'Flipping / rotación rápida',d:'Márgenes ajustados por precio de entrada alto. Requiere rehabilitación integral.',rec:0}
    ],
    risks:[
      {l:'Riesgo de desocupación',v:5,lv:'l',t:'Muy bajo'},{l:'Riesgo de impago',v:20,lv:'l',t:'Bajo'},
      {l:'Riesgo de ocupación ilegal',v:15,lv:'l',t:'Bajo'},{l:'Riesgo regulatorio',v:75,lv:'h',t:'Alto'},
      {l:'Riesgo de sobreprecio',v:65,lv:'m',t:'Medio'},{l:'Riesgo de baja demanda',v:5,lv:'l',t:'Mínimo'}
    ],
    simDef:{precio:310000,renta:1196,gastos:22},
    steps:[
      {n:1,title:'Ticket objetivo',desc:'Piso de 60–80 m², 2–3 hab., plantas altas con vistas. Precio 280.000–380.000 €. Priorizar fincas con ascensor y comunidad ordenada.',tag:'st-now',tl:'Inmediato'},
      {n:2,title:'Evitar bajos y locales reconvertidos',desc:'Baja demanda relativa y problemas legales de cambio de uso. El diferencial de precio no compensa el riesgo.',tag:'st-now',tl:'Antes de comprar'},
      {n:3,title:'Perfil de inquilino: profesional o familia',desc:'Gràcia atrae perfiles solventes. Exigir nóminas 3× la renta. Rotación baja si el piso está bien mantenido.',tag:'st-mid',tl:'Al alquilar'},
      {n:4,title:'Vigilar la regulación de rentas',desc:'Barcelona aplica índices de contención. Documentar bien el precio anterior. Contratar gestor especializado en normativa catalana.',tag:'st-mid',tl:'Gestión'},
      {n:5,title:'Horizonte de salida: 7–10 años',desc:'Proyección 5.900–6.200 €/m² en 2029. Plusvalía estimada bruta en 65 m² comprado hoy: ~88.000 € + rentas acumuladas. Mercado muy líquido.',tag:'st-long',tl:'Largo plazo'}
    ]
  },
  lavapies: {
    name:'Lavapiés', city:'Madrid', type:'Barrio en transformación', rating:'B', rscore:6.9, rlabel:'Interesante con reservas',
    kpi:[
      {l:'Alquiler m²/mes',v:'16,1 €',d:'▲ +9,4% interanual',up:1},
      {l:'Venta €/m²',v:'4.120 €',d:'▲ +11,2% interanual',up:1},
      {l:'Rentabilidad bruta',v:'4,9%',d:'▲ +0,5 pp vs año ant.',up:1},
      {l:'Rentabilidad neta',v:'3,4%',d:'Descontando gastos',up:0},
      {l:'PER (años)',v:'21,3',d:'Recuperación inversión',up:0},
      {l:'Ocupación media',v:'93%',d:'▲ +2% interanual',up:1}

var YEARS = ['2014','2015','2016','2017','2018','2019','2020','2021','2022','2023','2024'];
var PROJ_YEARS = ['2025','2026','2027','2028','2029'];
var ALL_YEARS = YEARS.concat(PROJ_YEARS);
var YIELD_YEARS = ['2020','2021','2022','2023','2024'];

var charts = [];
var currentZone = 'gracia';

function fmt(n) { return Math.round(n).toLocaleString('es-ES'); }
function rcls(r) { return r==='A'?'rating-a':r==='B'?'rating-b':'rating-c'; }
function scls(l) { return l==='h'?'score-h':l==='m'?'score-m':'score-l'; }
function starcls(l) { return l==='h'?'star-h':l==='m'?'star-m':'star-l'; }
function stars(s,l) {
  var f = Math.round(s/10*5);
  return Array.from({length:5},function(_,i){return '<div class="star'+(i<f?' '+starcls(l):'')+'"></div>';}).join('');
}
function hcolor(s) { return s>=70?'#4caf82':s>=50?'#d4955a':'#e07070'; }

function destroyCharts() {
  charts.forEach(function(c){try{c.destroy();}catch(e){}});
  charts=[];
}

function buildCharts(z) {
  var rentHist = z.rentH.concat(Array(z.projR.length).fill(null));
  var rentProj = Array(YEARS.length-1).fill(null).concat([z.rentH[YEARS.length-1]]).concat(z.projR);
  var ventaHist = z.ventaH.concat(Array(z.projV.length).fill(null));
  var ventaProj = Array(YEARS.length-1).fill(null).concat([z.ventaH[YEARS.length-1]]).concat(z.projV);

  var gridColor = 'rgba(255,255,255,0.04)';
  var tickColor = '#5a5754';

  charts.push(new Chart(document.getElementById('c-rent'), {
    type:'line',
    data:{labels:ALL_YEARS,datasets:[
      {label:'Histórico',data:rentHist,borderColor:'#6b9fd4',backgroundColor:'rgba(107,159,212,0.06)',tension:.4,pointRadius:3,fill:true,borderWidth:2},
      {label:'Proyección',data:rentProj,borderColor:'#4caf82',borderDash:[6,4],backgroundColor:'rgba(76,175,130,0.04)',tension:.4,pointRadius:3,fill:true,borderWidth:2}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:11},autoSkip:false,maxRotation:45}},
        y:{grid:{color:gridColor},ticks:{color:tickColor,callback:function(v){return v.toFixed(1)+' €'}}}}}
  }));

  charts.push(new Chart(document.getElementById('c-venta'), {
    type:'line',
    data:{labels:ALL_YEARS,datasets:[
      {label:'Histórico',data:ventaHist,borderColor:'#d4955a',backgroundColor:'rgba(212,149,90,0.06)',tension:.4,pointRadius:3,fill:true,borderWidth:2},
      {label:'Proyección',data:ventaProj,borderColor:'#c8a96e',borderDash:[6,4],backgroundColor:'rgba(200,169,110,0.04)',tension:.4,pointRadius:3,fill:true,borderWidth:2}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:11},autoSkip:false,maxRotation:45}},
        y:{grid:{color:gridColor},ticks:{color:tickColor,callback:function(v){return v.toLocaleString('es-ES')+' €'}}}}}
  }));

  charts.push(new Chart(document.getElementById('c-comp'), {
    type:'bar',
    data:{
      labels:z.compZones.map(function(c){return c.z;}),
      datasets:[{label:'Rentabilidad bruta',data:z.compZones.map(function(c){return c.v;}),
        backgroundColor:z.compZones.map(function(c){return c.focus?'#c8a96e':'#2a2826';}),
        borderColor:z.compZones.map(function(c){return c.focus?'#c8a96e':'rgba(255,255,255,0.08)';}),
        borderWidth:1,borderRadius:6}]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{color:tickColor,font:{size:12}}},
        y:{grid:{color:gridColor},ticks:{color:tickColor,callback:function(v){return v+'%'}},min:2,max:8}}}
  }));

  charts.push(new Chart(document.getElementById('c-yield'), {
    type:'line',
    data:{labels:YIELD_YEARS,datasets:[
      {label:z.name,data:z.yieldH,borderColor:'#c8a96e',backgroundColor:'rgba(200,169,110,0.06)',tension:.4,pointRadius:5,fill:true,borderWidth:2},
      {label:'Referencia zona',data:z.yieldRef,borderColor:'rgba(255,255,255,0.2)',borderDash:[5,4],tension:.4,pointRadius:4,fill:false,borderWidth:1.5}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{color:gridColor},ticks:{color:tickColor}},
        y:{grid:{color:gridColor},ticks:{color:tickColor,callback:function(v){return v+'%'}},min:2,max:8}}}
  }));
}

function calcSim(z) {
  var p = parseInt(document.getElementById('s-precio').value);
  var r = parseInt(document.getElementById('s-renta').value);
  var g = parseInt(document.getElementById('s-gastos').value)/100;
  document.getElementById('s-precio-v').textContent = fmt(p)+' €';
  document.getElementById('s-renta-v').textContent = fmt(r)+' €';
  document.getElementById('s-gastos-v').textContent = parseInt(document.getElementById('s-gastos').value)+'%';
  var rb=r*12, ga=Math.round(rb*g), rn=rb-ga;
  var yb=(rb/p*100).toFixed(2), yn=(rn/p*100).toFixed(2);
  var per=(p/rb).toFixed(1), cr=(rn/p*100).toFixed(2);
  document.getElementById('sim-rb').textContent = yb+'%';
  document.getElementById('sim-rn').textContent = yn+'%';
  document.getElementById('sim-ib').textContent = fmt(rb)+' €';
  document.getElementById('sim-gst').textContent = '-'+fmt(ga)+' €';
  document.getElementById('sim-in').textContent = fmt(rn)+' €';
  document.getElementById('sim-per').textContent = per+' años';
  document.getElementById('sim-cr').textContent = cr+'%';
}

        '<div class="sim-result-item"><div class="sim-result-label">Ingreso neto/año</div><div class="sim-result-value up" id="sim-in"></div></div>'+
        '<div class="sim-result-item"><div class="sim-result-label">PER</div><div class="sim-result-value" id="sim-per"></div></div>'+
        '<div class="sim-result-item"><div class="sim-result-label">Cap rate</div><div class="sim-result-value" id="sim-cr"></div></div>'+
      '</div>'+
      '<p class="chart-note" style="margin-top:14px">Gastos incluyen IBI, comunidad, seguro, mantenimiento, vacancia y gestión. No incluye IRPF ni financiación.</p>'+
    '</div>'+
  '</div>'+

  '<div class="section fade-in">'+
    '<div class="section-header"><div class="section-title">Comparativa con zonas similares</div><div class="section-line"></div><div class="section-num">07</div></div>'+
    '<div class="chart-container" style="margin-bottom:16px">'+
      '<div class="chart-wrap" style="height:220px"><canvas id="c-comp" role="img" aria-label="Comparativa rentabilidad bruta por zona"></canvas></div>'+
    '</div>'+
    '<div class="comp-grid">'+z.compZones.map(function(c){
      return '<div class="comp-card'+(c.focus?' focus':'')+'"><div class="comp-zone-name">'+c.z+'</div><div class="comp-yield">'+c.v.toFixed(1)+'%</div><div class="comp-details">'+c.pm.toLocaleString('es-ES')+' €/m²<br>'+c.pr.toFixed(1)+' €/m²/mes</div><span class="comp-badge '+c.cls+'">'+c.bl+'</span></div>';
    }).join('')+'</div>'+
  '</div>'+

  '<div class="section fade-in">'+
    '<div class="section-header"><div class="section-title">Evolución de la rentabilidad</div><div class="section-line"></div><div class="section-num">08</div></div>'+
    '<div class="chart-container">'+
      '<div class="chart-legend">'+
        '<span class="leg-item"><span class="leg-dot" style="background:#c8a96e"></span>'+z.name+'</span>'+
        '<span class="leg-item"><span class="leg-dot" style="background:rgba(255,255,255,0.2)"></span>Referencia zona</span>'+
      '</div>'+
      '<div class="chart-wrap" style="height:200px"><canvas id="c-yield" role="img" aria-label="Evolución rentabilidad bruta 2020-2024"></canvas></div>'+
    '</div>'+
  '</div>'+

  '<div class="section fade-in">'+
    '<div class="section-header"><div class="section-title">Rating global</div><div class="section-line"></div><div class="section-num">09</div></div>'+
    '<div class="rating-detail-block">'+
      '<div class="rating-big '+rcls(z.rating)+'">'+z.rscore.toFixed(1)+'</div>'+
      '<div class="rating-bars">'+z.rdetail.map(function(r){
        var pct=Math.min(r.v/10*100,100).toFixed(0);
        return '<div class="rbar-row"><span class="rbar-label">'+r.l+'</span><div class="rbar-track"><div class="rbar-fill" style="width:'+pct+'%"></div></div><span class="rbar-num">'+r.v.toFixed(1)+'</span></div>';
      }).join('')+'</div>'+
    '</div>'+
  '</div>'+

  '<div class="section fade-in">'+
    '<div class="section-header"><div class="section-title">Perfil de inversor recomendado</div><div class="section-line"></div><div class="section-num">10</div></div>'+
    '<div class="inv-grid">'+z.inv.map(function(i){
      return '<div class="inv-card'+(i.rec?' recommended':'')+'">'+
        (i.rec?'<div class="inv-rec-badge">&#10003; Más recomendado</div>':'')+
        '<div class="inv-type">'+i.t+'</div><div class="inv-name">'+i.n+'</div><div class="inv-desc">'+i.d+'</div></div>';
    }).join('')+'</div>'+
  '</div>'+

  '<div class="section fade-in">'+
    '<div class="section-header"><div class="section-title">Análisis de riesgos</div><div class="section-line"></div><div class="section-num">11</div></div>'+
    '<div class="risk-grid">'+z.risks.map(function(r){
      return '<div class="risk-row"><span class="risk-label">'+r.l+'</span>'+
        '<div class="risk-bar-track"><div class="risk-bar-fill rb-'+r.lv+'" style="width:'+r.v+'%"></div></div>'+
        '<span class="risk-tag '+(r.lv==='l'?'up':r.lv==='h'?'dn':'nt')+'">'+r.t+'</span></div>';
    }).join('')+'</div>'+
  '</div>'+

  '<div class="section fade-in">'+
    '<div class="section-header"><div class="section-title">Estrategia de entrada recomendada</div><div class="section-line"></div><div class="section-num">12</div></div>'+
    '<div class="steps-grid">'+z.steps.map(function(s){
      return '<div class="step-card"><div class="step-num">'+s.n+'</div><div class="step-body"><div class="step-title">'+s.title+'</div><div class="step-desc">'+s.desc+'</div><span class="step-tag '+s.tag+'">'+s.tl+'</span></div></div>';
    }).join('')+'</div>'+
  '</div>'+

  '<div class="footer fade-in">'+
    '<div class="footer-left">Zona Report</div>'+
    '<div class="footer-right">Datos de ejemplo · Actualizar con datos reales antes de distribuir</div>'+
  '</div>';

  setTimeout(function() {
    buildCharts(z);
    calcSim(z);
  }, 80);
}

function sel(zid, btn) {
  currentZone = zid;
  document.querySelectorAll('.zbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  render(zid);
}

render('gracia');
</script>
</body>
</html>
